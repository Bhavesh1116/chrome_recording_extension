<!DOCTYPE html>
<html>
<head>
    <title>RecordSnap Icon Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #2563eb; }
        .icons { display: flex; gap: 20px; flex-wrap: wrap; margin: 30px 0; }
        .icon-box {
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
        }
        canvas { border: 1px solid #ddd; margin: 10px 0; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RecordSnap Icon Generator</h1>
        <p>Click buttons to download icons</p>
        
        <div class="icons">
            <div class="icon-box">
                <h3>16x16</h3>
                <canvas id="icon16" width="16" height="16"></canvas>
                <br><button onclick="download('icon16', 'icon16.png')">Download</button>
            </div>
            <div class="icon-box">
                <h3>32x32</h3>
                <canvas id="icon32" width="32" height="32"></canvas>
                <br><button onclick="download('icon32', 'icon32.png')">Download</button>
            </div>
            <div class="icon-box">
                <h3>48x48</h3>
                <canvas id="icon48" width="48" height="48"></canvas>
                <br><button onclick="download('icon48', 'icon48.png')">Download</button>
            </div>
            <div class="icon-box">
                <h3>128x128</h3>
                <canvas id="icon128" width="128" height="128"></canvas>
                <br><button onclick="download('icon128', 'icon128.png')">Download</button>
            </div>
        </div>
        
        <button onclick="downloadAll()" style="font-size: 16px; padding: 15px 30px;">
            Download All Icons
        </button>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            
            // Clear
            ctx.clearRect(0, 0, size, size);
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#2563eb');
            gradient.addColorStop(1, '#3b82f6');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Round corners
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.15);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            
            // Camera/Record icon
            const centerX = size / 2;
            const centerY = size / 2;
            const iconSize = size * 0.5;
            
            // Outer circle (record button)
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(centerX, centerY, iconSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner circle (record dot)
            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.arc(centerX, centerY, iconSize * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw all icons
        drawIcon(document.getElementById('icon16'));
        drawIcon(document.getElementById('icon32'));
        drawIcon(document.getElementById('icon48'));
        drawIcon(document.getElementById('icon128'));
        
        function download(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        function downloadAll() {
            download('icon16', 'icon16.png');
            setTimeout(() => download('icon32', 'icon32.png'), 200);
            setTimeout(() => download('icon48', 'icon48.png'), 400);
            setTimeout(() => download('icon128', 'icon128.png'), 600);
        }
    </script>
</body>
</html>
